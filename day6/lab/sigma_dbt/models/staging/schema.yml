version: 2

sources:
  - name: sigma_de
    database: SIGMA_DE
    schema: PUBLIC
    description: "Raw Sigma DataTech tables in Snowflake SIGMA_DE.PUBLIC."
    tables:
      - name: fact_transactions
        description: "One row per payment transaction."
      - name: dim_merchant
        description: "Merchant master data."
      - name: dim_customer
        description: "Customer master data."

models:
  - name: stg_transactions
    description: >
      Cleaned FACT_TRANSACTIONS. Filters TEST_ merchants, uppercases status
      and payment_method, lowercases IDs.
    columns:
      - name: transaction_id
        description: "Unique identifier (lowercased)."
        tests:
          - not_null
          - unique
      - name: amount
        description: "Transaction value in USD."
        tests:
          - not_null
      - name: status
        description: "COMPLETED, FAILED, or PENDING."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['COMPLETED', 'FAILED', 'PENDING']
      - name: merchant_id
        description: "Lowercased merchant FK."
        tests:
          - not_null
      - name: customer_id
        description: "Lowercased customer FK."
        tests:
          - not_null
      - name: transaction_date
        description: "Date of the transaction."
        tests:
          - not_null
      - name: payment_method
        description: "CREDIT_CARD, DEBIT_CARD, or UPI."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['CREDIT_CARD', 'DEBIT_CARD', 'UPI']
      - name: loaded_at
        description: "dbt load timestamp."
        tests:
          - not_null
