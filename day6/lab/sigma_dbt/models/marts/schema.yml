version: 2

models:
  - name: mart_merchant_performance
    description: >
      Aggregated merchant KPIs. One row per merchant.
      Revenue counts COMPLETED transactions only (business rule).
      failure_rate_pct = failed / total * 100.
    columns:
      - name: merchant_id
        description: "Merchant identifier."
        tests:
          - not_null
          - unique
      - name: merchant_name
        description: "Human-readable merchant name."
        tests:
          - not_null
      - name: category
        description: "Merchant category."
        tests:
          - accepted_values:
              values: ['Food Delivery', 'E-Commerce', 'Entertainment', 'Travel', 'Grocery Delivery', 'Grocery']
      - name: city
        description: "Merchant HQ city."
      - name: total_transactions
        description: "Total COMPLETED + FAILED transactions."
        tests:
          - not_null
      - name: failed_count
        description: "Number of FAILED transactions."
        tests:
          - not_null
      - name: total_revenue
        description: "Revenue from COMPLETED transactions only (USD)."
        tests:
          - not_null
      - name: avg_transaction_value
        description: "Average value of COMPLETED transactions."
      - name: unique_customers
        description: "Distinct customers who transacted with this merchant."
        tests:
          - not_null
      - name: failure_rate_pct
        description: "Failure rate as a percentage (0–100)."
